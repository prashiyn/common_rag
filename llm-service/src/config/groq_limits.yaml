# Groq Cloud rate limits (requests, tokens, audio). Source: https://console.groq.com/docs/rate-limits
#
# Environment: set GROQ_PLAN=FREE (default) or GROQ_PLAN=DEV to choose a block under `plans`.
# Model keys must match LiteLLM / this service: `groq/<MODEL ID>` (see Groq docs MODEL ID column).
#
# Fields:
#   rpm, rpd — requests per minute / per day (enforced by GroqRateLimiter).
#   tpm, tpd — tokens per minute / per day (documented for reference; not enforced in-process yet).
#   ash, asd — audio seconds per hour / per day (Whisper family; not enforced in-process yet).
# Omit a metric when Groq shows "-" for that cell.

plans:
  FREE:
    # Fallback when a `groq/...` model is missing from `models` (conservative).
    default_rpm: 30
    default_rpd: 1000
    models:
      groq/allam-2-7b:
        rpm: 30
        rpd: 7000
        tpm: 6000
        tpd: 500000
      groq/canopylabs/orpheus-arabic-saudi:
        rpm: 10
        rpd: 100
        tpm: 1200
        tpd: 3600
      groq/canopylabs/orpheus-v1-english:
