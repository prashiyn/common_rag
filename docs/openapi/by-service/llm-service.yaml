          description: Source page when available
        bundle_id:
          type: string
          title: Bundle Id
          description: Semantic bundle id
        section_title:
          anyOf:
          - type: string
          - type: 'null'
          title: Section Title
          description: Nearest section heading
        title_summary:
          type: string
          title: Title Summary
          description: LLM section summary
          default: ''
        publish_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Publish Date
          description: Document publish date if provided
        prev_chunk:
