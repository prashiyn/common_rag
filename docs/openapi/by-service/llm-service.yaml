openapi: 3.1.0
info:
  title: Unified API — llm-service
  description: OpenAPI slice for `/llm-service` routes on the unified API. Generated
    from unified_api; use openapi.json for the full contract.
  version: 1.0.0
servers:
- url: http://127.0.0.1:8000
  description: Local development
- url: http://localhost:8000
  description: Local development (localhost)
- url: http://unified_api:8000
  description: Docker Compose network
paths:
  /llm-service/health:
    get:
      tags:
      - llm-service
      summary: Health
      operationId: health_llm_service_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Llm Service Health Get
  /llm-service/health/ready:
    get:
      tags:
      - llm-service
      summary: Ready
      operationId: ready_llm_service_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Ready Llm Service Health Ready Get
  /llm-service/llm/complete:
    post:
      tags:
      - llm-service
      summary: Completion
      operationId: completion_llm_service_llm_complete_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /llm-service/llm/models:
    get:
      tags:
      - llm-service
      summary: Models
      operationId: models_llm_service_llm_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
  /llm-service/llm/embeddings:
    post:
      tags:
      - llm-service
      summary: Embeddings
      operationId: embeddings_llm_service_llm_embeddings_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /llm-service/v1/chat/completions:
    post:
      tags:
      - llm-service
      summary: Chat Completions
      operationId: chat_completions_llm_service_v1_chat_completions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAIChatCompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIChatCompletionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /llm-service/v1/models:
    get:
      tags:
      - llm-service
      summary: List Models
      operationId: list_models_llm_service_v1_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIModelListResponse'
  /llm-service/v1/embeddings:
    post:
      tags:
      - llm-service
      summary: Create Embeddings
      operationId: create_embeddings_llm_service_v1_embeddings_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenAIEmbeddingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIEmbeddingListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
