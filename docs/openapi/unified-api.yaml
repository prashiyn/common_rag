  /doc-processing/documents/chunk:
    post:
      tags:
      - doc-processing
      summary: Chunk Document
      description: 'Chunk a document using the Financial Filings Pipeline (FFP).


        Accepts **PDF**, **Markdown**, **HTML** (including `.xhtml`), or **XBRL**
        (`.xml` / `.xbrl`).

        XBRL is converted to markdown first, then chunked like markdown.


        Provide either `file` (upload) or `url` (fetched to a temp file).'
      operationId: chunk_document_doc_processing_documents_chunk_post
      parameters:
      - name: url
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uri
            minLength: 1
            maxLength: 2083
          - type: 'null'
          title: Url
      - name: doc_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Stored on each chunk; default is upload filename stem or URL
            path stem
          title: Doc Id
        description: Stored on each chunk; default is upload filename stem or URL
          path stem
      - name: publish_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional publish date metadata on chunks
          title: Publish Date
        description: Optional publish date metadata on chunks
      - name: pdf_backend
        in: query
        required: false
        schema:
          enum:
          - easyocr
          - vlm
          type: string
          description: Docling backend when the input is PDF
          default: vlm
          title: Pdf Backend
        description: Docling backend when the input is PDF
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_chunk_document_doc_processing_documents_chunk_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
