  /doc-processing/documents/convert-ms-docs:
    post:
      tags:
      - doc-processing
      summary: Convert Ms Docs
      description: Convert a Microsoft Office document (Word/Excel/PowerPoint) to
        markdown from file upload or URL.
      operationId: convert_ms_docs_doc_processing_documents_convert_ms_docs_post
      parameters:
      - name: url
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uri
            minLength: 1
            maxLength: 2083
          - type: 'null'
          title: Url
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_convert_ms_docs_doc_processing_documents_convert_ms_docs_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /doc-processing/documents/process-using-unstructured:
    post:
      tags:
      - doc-processing
      summary: Process Using Unstructured
      description: 'Process a PDF or image using Unstructured: extract tables, images,
        and metadata.


        Accepts either an uploaded file or a URL.'
      operationId: process_using_unstructured_doc_processing_documents_process_using_unstructured_post
      parameters:
      - name: url
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uri
            minLength: 1
            maxLength: 2083
          - type: 'null'
          title: Url
      - name: file_type
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - pdf
            - image
            - markdown
            type: string
          - type: 'null'
          title: File Type
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_process_using_unstructured_doc_processing_documents_process_using_unstructured_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessFromUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /doc-processing/documents/pdf-to-markdown:
    post:
      tags:
      - doc-processing
      summary: Pdf To Markdown Endpoint
      description: Convert a PDF to markdown using Docling (easyocr or vlm backend)
        from file upload or URL.
      operationId: pdf_to_markdown_endpoint_doc_processing_documents_pdf_to_markdown_post
      parameters:
      - name: url
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uri
            minLength: 1
            maxLength: 2083
          - type: 'null'
          title: Url
      - name: backend
        in: query
        required: false
        schema:
          enum:
          - easyocr
          - vlm
          type: string
          default: easyocr
          title: Backend
      - name: merge_tables
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Merge Tables
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_pdf_to_markdown_endpoint_doc_processing_documents_pdf_to_markdown_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfToMarkdownResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /doc-processing/documents/xbrl-to-markdown:
    post:
