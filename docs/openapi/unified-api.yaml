openapi: 3.1.0
info:
  title: Unified API
  description: 'All services in one process: llm-service, doc-processing, core-rag-graph,
    ra-literag, temporal-graph, temporal-graph-openai, temporal-graph-traversal.'
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Unified Health
      operationId: unified_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /llm-service/health:
    get:
      tags:
      - llm-service
      summary: Health
      operationId: health_llm_service_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Llm Service Health Get
  /llm-service/health/ready:
    get:
      tags:
      - llm-service
      summary: Ready
      operationId: ready_llm_service_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Ready Llm Service Health Ready Get
  /llm-service/llm/complete:
    post:
      tags:
      - llm-service
      summary: Completion
      operationId: completion_llm_service_llm_complete_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /llm-service/llm/models:
    get:
      tags:
