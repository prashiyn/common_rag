services:
  postgres:
    image: postgres:16
    container_name: unified-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fin_rag
    ports:
      - "5432:5432"
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fin_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.22
    container_name: unified-neo4j
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./db/neo4j_data:/data
      - ./db/neo4j_data/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p changeme 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    container_name: unified-chroma
    ports:
      - "8001:8000"
    volumes:
      - ./db/chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 15s
      timeout: 10s
      retries: 10

  doc_processing:
    build:
      context: ./doc_processing
      dockerfile: Dockerfile.compose
    container_name: doc-processing
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  core_rag_graph:
    build:
      context: ./core_rag_graph
      dockerfile: Dockerfile.compose
    container_name: core-rag-graph
    ports:
      - "20050:20050"
    depends_on:
      doc_processing:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  fin_rag:
    build:
      context: ./fin_rag
      dockerfile: Dockerfile.compose
    container_name: fin-rag
    environment:
      PORT: 6005
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fin_rag
      DOC_PROCESSING_BASE_URL: http://doc_processing:8000
      CHROMA_SERVER_HOST: chroma
      CHROMA_SERVER_PORT: 8000
    ports:
      - "6005:6005"
    depends_on:
      doc_processing:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    restart: unless-stopped

  ra_literag:
    build:
      context: ./ra_literag
      dockerfile: Dockerfile.compose
    container_name: ra-literag
    environment:
      PORT: 8000
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: changeme
      NEO4J_DATABASE: neo4j
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: fin_rag
      DOC_PROCESSING_BASE_URL: http://doc_processing:8000
    ports:
      - "8000:8000"
    depends_on:
      doc_processing:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  temporial_graph:
    build:
      context: ./temporial_graph
      dockerfile: Dockerfile.compose
    container_name: temporial-graph
    environment:
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      NEO4J_DATABASE: neo4j
      LLM_SERVICE_BASE_URL: http://doc_processing:8000
    ports:
      - "8082:8082"
    depends_on:
      doc_processing:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  temporial_graph_openai:
    build:
      context: ./temporial_graph_openai
      dockerfile: Dockerfile.compose
    container_name: temporial-graph-openai
    environment:
      TEMPORAL_GRAPH_API_HOST: 0.0.0.0
      TEMPORAL_GRAPH_API_PORT: 8080
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      NEO4J_DATABASE: neo4j
      DOC_PROCESSING_BASE_URL: http://doc_processing:8000
      JOB_BACKEND: memory
    ports:
      - "8080:8080"
    depends_on:
      doc_processing:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  temporial_graph_traversal:
    build:
      context: ./temporial_graph_traversal
      dockerfile: Dockerfile.compose
    container_name: temporial-graph-traversal
    environment:
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8090
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: changeme
      NEO4J_DATABASE: neo4j
    ports:
      - "8090:8090"
    depends_on:
      doc_processing:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

