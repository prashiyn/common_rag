services:
  postgres:
    image: postgres:16.4-bullseye
    container_name: unified-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — see repo-root .env.example}
      POSTGRES_DB: ${POSTGRES_BOOTSTRAP_DB:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_CREATE_DATABASES: >-
        ${POSTGRES_CREATE_DATABASES:-${POSTGRES_DB_FIN_RAG:-fin_rag},${POSTGRES_DB_RA_LITERAG:-ra_literag}}
    ports:
      - "5432:5432"
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_BOOTSTRAP_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.22
    container_name: unified-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set — see repo-root .env.example}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./db/neo4j_data:/data
      - ./db/neo4j_data/logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'cypher-shell -u "${NEO4J_USERNAME:-neo4j}" -p "${NEO4J_PASSWORD}" "RETURN 1" || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    container_name: unified-chroma
    ports:
      - "8001:8000"
    volumes:
      - ./db/chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: unified-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./db/ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    # Optional GPU (uncomment if NVIDIA Container Toolkit is installed):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # On-demand only (profile ollama-bootstrap). Does not run on plain `compose up`.
  ollama_init:
    profiles:
      - ollama-bootstrap
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_PULL_MODELS: >-
        ${OLLAMA_PULL_MODELS:-nomic-embed-text-v2-moe:latest,ibm/granite3.3-vision:2b,ibm/granite-docling:latest,glm-ocr:latest,deepseek-ocr:latest}
    volumes:
      - ./docker/ollama/pull-models.sh:/pull-models.sh:ro
    entrypoint: ["/bin/sh", "/pull-models.sh"]
    restart: "no"

  unified_api:
    build:
      context: .
      dockerfile: unified_api/Dockerfile.compose
    container_name: unified-api
    env_file:
      - .env
      - ./llm-service/.env
      - ./doc_processing/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USERNAME:-neo4j}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set — see repo-root .env.example}
      NEO4J_DATABASE: neo4j
      NEO4J_ENABLED: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — see repo-root .env.example}
      POSTGRES_DATABASE: ${POSTGRES_DB_RA_LITERAG:-ra_literag}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      LIGHTRAG_VECTOR_STORAGE: ChromaVectorDBStorage
      LIGHTRAG_GRAPH_STORAGE: Neo4JStorage
      OLLAMA_API_BASE: http://ollama:11434
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_SERVICE_BASE_URL: http://localhost:8000/llm-service
      LLM_CLIENT_MODE: inprocess
      JOB_BACKEND: memory
      FIN_RAG_LOG_DIR: /app/logs
    volumes:
      - ./unified_api/logs:/repo/unified_api/logs
      - ./db/core_rag_graph/data:/repo/core_rag_graph/data
      - ./doc_processing/data/temp:/repo/doc_processing/data/temp
      - ./db/ra_literag_data:/repo/ra_literag/rag_storage
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # Option 3 ingress: stable URL for external compose stacks (see docs/unified-api/cross-compose-integration.md).
  unified_api_gateway:
    image: nginx:1.27-alpine
    container_name: unified-api-gateway
    ports:
      - "${UNIFIED_API_GATEWAY_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      unified_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - rag_shared
    restart: unless-stopped

  # One-shot Alembic (same image as fin_rag). fin_rag waits for exit 0 before starting.
  fin_rag_migrate:
    build:
      context: ./fin_rag
      dockerfile: Dockerfile.compose
    container_name: fin-rag-migrate
    env_file:
      - ./fin_rag/.env
    environment:
      FIN_RAG_LOG_DIR: /app/logs
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_FIN_RAG:-fin_rag}
    volumes:
      - ./fin_rag/logs:/app/logs
    command:
      [
        "sh",
        "-c",
        "mkdir -p /app/logs && set -o pipefail && uv run alembic upgrade head 2>&1 | tee -a /app/logs/alembic-migrate.log",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  fin_rag:
    build:
      context: ./fin_rag
      dockerfile: Dockerfile.compose
    container_name: fin-rag
    env_file:
      - ./fin_rag/.env
    environment:
      FIN_RAG_LOG_DIR: /app/logs
      CHROMA_SERVER_HOST: chroma
      CHROMA_SERVER_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_FIN_RAG:-fin_rag}
      LLM_SERVICE_BASE_URL: http://unified_api:8000/llm-service
    volumes:
      - ./fin_rag/logs:/app/logs
    ports:
      - "6005:6005"
    depends_on:
      fin_rag_migrate:
        condition: service_completed_successfully
      unified_api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    restart: unless-stopped

networks:
  rag_shared:
    name: rag_shared
    driver: bridge
